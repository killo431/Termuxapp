name: Build

on:
  push:
    branches:
      - master
      - android-10
      - claude/run-build-workflows
      - claude/fix-installation-issue-arm64
  pull_request:
    branches:
      - master
      - android-10
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clone repository
      uses: actions/checkout@v2
    - name: Set up JDK 11
      uses: actions/setup-java@v2
      with:
        java-version: '11'
        distribution: 'temurin'
    - name: Build
      run: |
        # This builds APKs for all supported architectures including ARM64 (arm64-v8a)
        # as configured in app/build.gradle ABI filters
        ./gradlew assembleDebug
    - name: Store generated APK file
      uses: actions/upload-artifact@v4
      with:
        name: termux-app
        path: ./app/build/outputs/apk/debug
